name: Release
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Install Dependencies
        run: bun install

      - name: Create Release Pull Request or Publish to NPM
        id: changesets
        uses: changesets/action@v1
        with:
          # This expects you to have a script called 'release' in package.json
          publish: npm run release
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Update GitHub Release Title and Body
        if: steps.changesets.outputs.published == 'true'
        run: |
          # Get the published version
          VERSION=$(node -p "require('./package.json').version")
          
          # Extract Hero Title from CHANGELOG.md (it's on the line starting with ## ⚓)
          HERO_TITLE=$(grep -A 10 "## $VERSION" CHANGELOG.md | grep "## ⚓" | head -n 1 | sed 's/## ⚓ //')
          
          # Extract the entire content block for this version from CHANGELOG.md
          # It takes everything between this version and the next version header
          sed -n "/## $VERSION/,/## [0-9]/p" CHANGELOG.md | sed '1d;$d' > release_notes.md
          
          if [ -z "$HERO_TITLE" ]; then
            FINAL_TITLE="⚓ Skill Harbor v$VERSION"
          else
            FINAL_TITLE="⚓ Skill Harbor v$VERSION: $HERO_TITLE"
          fi
          
          echo "Updating release v$VERSION with rich notes"
          gh release edit "v$VERSION" --title "$FINAL_TITLE" --notes-file release_notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
